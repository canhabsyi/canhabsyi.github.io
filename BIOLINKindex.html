<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canhabsyi Bio Link</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    width:100%;
    min-height:100%;
    overflow-x:hidden;
    background:#d8d8d8;
}

body{
    display:flex;
    justify-content:center;
}

/* FULL SCREEN */
.container{
    width:100%;
    min-height:100vh;
    position:relative;

    background:
    linear-gradient(rgba(255,255,255,.88),rgba(255,255,255,.88)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    padding-bottom:80px;
}

/* CONTENT */
.content{
    width:100%;
    max-width:520px;
    margin:auto;
    position:relative;
}

/* BANNER */
.banner{
    width:100%;
    height:260px;
    background:
    linear-gradient(135deg,#efefef,#f7f7f7,#e4e4e4);
    position:relative;
    overflow:hidden;
}

.banner::before{
    content:'';
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        45deg,
        rgba(0,0,0,.02) 0px,
        rgba(0,0,0,.02) 45px,
        transparent 45px,
        transparent 90px
    );
}

/* SHARE */
.share-btn{
    position:absolute;
    top:20px;
    right:20px;
    width:58px;
    height:58px;
    border-radius:50%;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    z-index:20;
    color:#444;
    font-size:22px;
}

/* PROFILE */
.profile{
    position:relative;
    margin-top:-60px;
    text-align:center;
    z-index:5;
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #fff;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.name{
    margin-top:18px;
    font-size:48px;
    font-weight:700;
    color:#111827;
    line-height:1;
}

.status{
    margin-top:10px;
    color:#d6382e;
    font-size:24px;
    font-weight:600;
}

/* COUNTDOWN */
.countdown{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.box{
    text-align:center;
}

.number{
    font-size:58px;
    font-weight:500;
    color:#111827;
    line-height:1;
}

.label{
    margin-top:10px;
    font-size:19px;
    color:#333;
}

/* SOCIAL */
.socials{
    margin-top:45px;
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.social{
    width:64px;
    height:64px;
    border-radius:50%;
    background:#8e949e;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:#fff;
    font-size:28px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

/* BUTTON */
.links{
    margin-top:50px;
    padding:0 24px;
}

.link-btn{
    width:100%;
    min-height:88px;
    border-radius:50px;
    background:#8a9099;
    margin-bottom:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:#fff;
    font-size:30px;
    font-weight:600;
    position:relative;
    box-shadow:0 10px 20px rgba(0,0,0,.14);
    transition:.3s;
}

.link-btn:hover{
    transform:translateY(-3px);
}

.icon-circle{
    position:absolute;
    left:-8px;
    width:74px;
    height:74px;
    border-radius:50%;
    background:#747b84;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 15px rgba(0,0,0,.18);
}

.icon-circle img{
    width:42px;
    height:42px;
    object-fit:contain;
}

/* FOOTER */
.footer{
    margin-top:70px;
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#111827;
}

.line{
    width:75%;
    margin:20px auto 0;
    border-bottom:3px dashed #4b5563;
}

/* MOBILE */
@media(max-width:768px){

.banner{
    height:220px;
}

.name{
    font-size:34px;
}

.status{
    font-size:19px;
}

.number{
    font-size:42px;
}

.label{
    font-size:15px;
}

.link-btn{
    min-height:74px;
    font-size:23px;
}

.icon-circle{
    width:62px;
    height:62px;
}

.icon-circle img{
    width:34px;
    height:34px;
}

.social{
    width:58px;
    height:58px;
    font-size:24px;
}

.footer{
    font-size:24px;
}

}

</style>
</head>

<body>

<div class="container">

    <div class="content">

        <!-- SHARE -->
        <div class="share-btn">
            <i class="fa-solid fa-share-nodes"></i>
        </div>

        <!-- BANNER -->
        <div class="banner"></div>

        <!-- PROFILE -->
        <div class="profile">

            <img src="https://i.imgur.com/yXOvdOS.jpeg">

            <div class="name">
                Canhabsyi
            </div>

            <div class="status">
                Calon Jenazah
            </div>

        </div>

        <!-- COUNTDOWN -->
        <div class="countdown">

            <div class="box">
                <div class="number">00</div>
                <div class="label">Days</div>
            </div>

            <div class="box">
                <div class="number">00</div>
                <div class="label">Hours</div>
            </div>

            <div class="box">
                <div class="number">00</div>
                <div class="label">Minutes</div>
            </div>

            <div class="box">
                <div class="number">00</div>
                <div class="label">Seconds</div>
            </div>

        </div>

        <!-- SOCIAL -->
        <div class="socials">

            <a href="#" class="social">
                <i class="fa-brands fa-spotify"></i>
            </a>

            <a href="#" class="social">
                <i class="fa-brands fa-youtube"></i>
            </a>

            <a href="#" class="social">
                <i class="fa-brands fa-tiktok"></i>
            </a>

            <a href="#" class="social">
                <i class="fa-brands fa-instagram"></i>
            </a>

        </div>

        <!-- LINKS -->
        <div class="links">

            <a href="#" class="link-btn">

                <div class="icon-circle">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                </div>

                WhatsApp

            </a>

            <a href="#" class="link-btn">

                <div class="icon-circle">
                    <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
                </div>

                E-mail

            </a>

            <a href="#" class="link-btn">

                <div class="icon-circle">
                    <img src="https://cdn-icons-png.flaticon.com/512/1047/1047711.png">
                </div>

                Traktir Ngopi

            </a>

        </div>

        <!-- FOOTER -->
        <div class="footer">

            Maluku ID

            <div class="line"></div>

        </div>

    </div>

</div>

</body>
</html>
