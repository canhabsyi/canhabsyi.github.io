<script>
function updateClock() {
    const dateTime = new Date();
    const hours = dateTime.getHours();
    const minutes = String(dateTime.getMinutes()).padStart(2, '0');
    const seconds = String(dateTime.getSeconds()).padStart(2, '0');
    const timeString = `${hours}:${minutes}:${seconds}`;
    document.getElementById('clock').textContent = timeString;
}
setInterval(updateClock, 1000);
updateClock();
</script>

<script>
// Video pertama yang akan ditampilkan saat halaman dimuat
const videoPertama = 'https://canhabsyi.github.io/jwp/';

// Fungsi untuk mengganti video
function gantiVideo(url) {
    // Mengubah atribut src dari iframe dengan id video
    document.getElementById('video').src = url;
}

// Atur video pertama saat halaman dimuat
document.addEventListener('DOMContentLoaded', function() {
    gantiVideo(videoPertama);
});
</script>
	
    <script>
        // Code Developed by BlogTriggers Team members
        window.onload = function() {
            document.addEventListener("contextmenu", function(e) {
                e.preventDefault();
            }, false);

            function disabledEvent(e) {
                if (e.stopPropagation) {
                    e.stopPropagation();
                } else if (window.event) {
                    window.event.cancelBubble = true;
                }
                e.preventDefault();
                return false;
            }
        };
        document.onkeydown = function(e) {
            return false;
        }
        navigator.keyboard.lock();
    </script>
