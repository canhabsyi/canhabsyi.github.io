<script>
function updateClock() {
    const dateTime = new Date();
    const hours = dateTime.getHours();
    const minutes = String(dateTime.getMinutes()).padStart(2, '0');
    const seconds = String(dateTime.getSeconds()).padStart(2, '0');
    const timeString = `${hours}:${minutes}:${seconds}`;
    document.getElementById('clock').textContent = timeString;
}
setInterval(updateClock, 1000);
updateClock();
</script>

<script>

const videoPertama = 'https://canhabsyi.github.io/plyr/?url=https://rctiplus.icanplay.my.id/gtv.m3u8';

// Fungsi untuk mengganti video
function gantiVideo(url) {
    // Mengubah atribut src dari iframe dengan id video
    document.getElementById('video').src = url;
}

// Atur video pertama saat halaman dimuat
document.addEventListener('DOMContentLoaded', function() {
    gantiVideo(videoPertama);
});
</script>

            function disabledEvent(e) {
                if (e.stopPropagation) {
                    e.stopPropagation();
                } else if (window.event) {

                }
